<h2>RacingSoundtracks Radio</h2>

<div class="row g-3">
    <!-- Player + now-playing info -->
    <div class="col-md-8 col-lg-9">
        <div id="radio-now-playing" class="mb-2" style="min-height:1.4rem;"></div>
        <div class="ratio ratio-16x9">
            <div id="radio-player"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="col-md-4 col-lg-3 d-flex flex-column gap-3">
        <button id="radio-skip" class="btn btn-primary" disabled>&#9654; Skip</button>

        <div id="radio-queued-box" class="alert alert-success py-2 px-2 mb-0" style="display:none;"></div>

        <!-- Queue next song -->
        <div>
            <div class="fw-semibold mb-1">Queue next song</div>
            <div class="position-relative">
                <input type="text" id="radio-queue-band" class="form-control form-control-sm mb-1" placeholder="Artist...">
                <input type="text" id="radio-queue-title" class="form-control form-control-sm" placeholder="Title...">
                <div id="radio-search-results" class="list-group position-absolute w-100 shadow" style="display:none;z-index:1050;max-height:220px;overflow-y:auto;top:100%;left:0;"></div>
            </div>
        </div>

        <!-- Preferred ratio -->
        <div>
            <label class="form-label mb-1 fw-semibold">
                Preferred: <strong id="radio-ratio-display">70</strong>%
            </label>
            <input type="range" id="radio-ratio" class="form-range" min="0" max="100" value="70">
        </div>

        <!-- Series preferences -->
        <div>
            <button class="btn btn-sm btn-outline-secondary w-100" type="button"
                    data-bs-toggle="collapse" data-bs-target="#radio-prefs-panel">
                Series preferences
            </button>
            <div class="collapse mt-2" id="radio-prefs-panel">
                <div id="radio-series-list" class="small" style="max-height:300px;overflow-y:auto;">Loading...</div>
            </div>
        </div>

        <!-- All games preferences -->
        <div>
            <button class="btn btn-sm btn-outline-secondary w-100" type="button"
                    data-bs-toggle="collapse" data-bs-target="#radio-games-panel">
                Game preferences
            </button>
            <div class="collapse mt-2" id="radio-games-panel">
                <input type="text" id="radio-games-filter" class="form-control form-control-sm mb-2" placeholder="Filter games...">
                <div id="radio-all-games-list" class="small" style="max-height:300px;overflow-y:auto;">Loading...</div>
            </div>
        </div>

        <!-- Genre preferences -->
        <div>
            <button class="btn btn-sm btn-outline-secondary w-100" type="button"
                    data-bs-toggle="collapse" data-bs-target="#radio-genres-panel">
                Genre preferences
            </button>
            <div class="collapse mt-2" id="radio-genres-panel">
                <div id="radio-genre-list" class="small" style="max-height:200px;overflow-y:auto;">Loading...</div>
            </div>
        </div>

        <!-- Reset + summary -->
        <div>
            <button id="radio-reset-prefs" class="btn btn-sm btn-outline-danger w-100" type="button">Reset preferences</button>
            <div id="radio-prefs-summary" class="small text-muted mt-2"></div>
            <div id="radio-pref-count" class="small text-muted"></div>
        </div>
    </div>
</div>

<!-- History table (no thead, mirroring game page table style) -->
<table class="table table-hover table-striped mt-4 radio-history-table">
    <tbody id="radio-history-body">
    </tbody>
</table>

<script th:src="@{/min/js/radio.js}" type="application/javascript"></script>
