<div id="band-connections-page">
    <h2 class="mb-1">Artist connections</h2>
    <p class="text-muted mb-3">
        Find the shortest chain between two artists via shared racing game soundtracks —
        the music equivalent of Six Degrees of Kevin Bacon.
    </p>

    <div class="row g-3 mb-3">
        <div class="col-md-5">
            <label for="fromArtistInput" class="form-label fw-semibold">First artist</label>
            <div class="position-relative">
                <input type="text" class="form-control" id="fromArtistInput"
                       placeholder="Type artist name..." autocomplete="off">
                <input type="hidden" id="fromArtistId">
                <div id="fromArtistSuggestions" class="dropdown-menu w-100 shadow-sm"></div>
            </div>
        </div>
        <div class="col-md-5">
            <label for="toArtistInput" class="form-label fw-semibold">Second artist</label>
            <div class="position-relative">
                <input type="text" class="form-control" id="toArtistInput"
                       placeholder="Type artist name..." autocomplete="off">
                <input type="hidden" id="toArtistId">
                <div id="toArtistSuggestions" class="dropdown-menu w-100 shadow-sm"></div>
            </div>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button id="findConnectionBtn" class="btn btn-primary w-100">Find connection</button>
        </div>
    </div>

    <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="sameGroupToggle">
        <label class="form-check-label" for="sameGroupToggle">
            Strict mode — only connect artists who appear in the <em>same platform/group</em> within a game
        </label>
    </div>

    <div id="connection-spinner" class="my-3" style="display:none;">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        <span class="text-muted">Searching...</span>
    </div>

    <div id="connection-result" class="mt-2"></div>
</div>
